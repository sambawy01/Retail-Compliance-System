name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Go Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Download deps
        run: go mod download
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./... -v -cover

  edge-agent:
    name: Python Edge Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: pip install uv
      - name: Sync deps (lightweight)
        working-directory: edge-agent
        run: |
          uv pip install --system pydantic httpx pyyaml tenacity numpy
      - name: Syntax check
        working-directory: edge-agent
        run: python3 -m py_compile src/edge/*.py src/edge/detectors/*.py src/edge/events/*.py
      - name: Import check (no ML deps)
        working-directory: edge-agent
        run: PYTHONPATH=src python3 -c "import edge; print('import OK')"

  dashboard:
    name: React Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install deps
        working-directory: web
        run: npm ci
      - name: Build
        working-directory: web
        run: npm run build