version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: watchdog
      POSTGRES_PASSWORD: watchdog_dev
      POSTGRES_DB: watchdog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchdog"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  server:
    build: .
    ports:
      - "8080:8080"
    environment:
      ENV: development
      PORT: "8080"
      # Connect as watchdog (superuser) but app code should SET ROLE watchdog_app
      # to ensure RLS policies apply. In production, use a dedicated non-superuser role.
      DATABASE_URL: postgres://watchdog:watchdog_dev@db:5432/watchdog?sslmode=disable
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: debug
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata: